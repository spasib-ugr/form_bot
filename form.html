<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Форма клиента</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
font-family:Arial;
padding:20px;
background:#f4f4f4;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;
}

input,select,textarea,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2f80ed;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Новая запись</h2>

<label>Клиентский менеджер</label>
<select id="manager">
<option value="Иван Иванов">Иван Иванов</option>
<option value="Петр Петров">Петр Петров</option>
<option value="Алексей Сидоров">Алексей Сидоров</option>
</select>

<label>800+/800-</label>
<select id="income">
<option value="800+">800+</option>
<option value="800-">800-</option>
</select>

<label>ИНН</label>
<input id="inn" placeholder="10 цифр">

<label>Продукт</label>
<select id="product">
<option value="РЕПО">РЕПО</option>
<option value="Процентное хеджирование">Процентное хеджирование</option>
<option value="Валютное хеджирование">Валютное хеджирование</option>
</select>

<label>ФИО / должность</label>
<input id="addressing">

<label>Телефон</label>
<input id="phone">

<label>Комментарий</label>
<textarea id="comment"></textarea>

<button onclick="sendData()">Отправить</button>

</div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

function sendData(){

const data = {

credit_manager: document.getElementById("manager").value,
income: document.getElementById("income").value,
inn: document.getElementById("inn").value,
product: document.getElementById("product").value,
addressing: document.getElementById("addressing").value,
phone: document.getElementById("phone").value,
comment: document.getElementById("comment").value

}

tg.sendData(JSON.stringify(data))
tg.close()

}

</script>

</body>
</html>
